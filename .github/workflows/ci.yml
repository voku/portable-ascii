on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [
            7.2,
            7.3,
            7.4,
            8.0,
            8.1,
            8.2,
            8.3,
            8.4,
            8.5
        ]
        composer: [basic]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          extensions: zip
          tools: composer

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "directory=$(composer config cache-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: ${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ matrix.php }}-composer-

      - name: Install dependencies
        run: |
          if [[ "${{ matrix.composer }}" == "lowest" ]]; then
            composer update --prefer-dist --no-interaction --prefer-lowest --prefer-stable
          elif [[ "${{ matrix.composer }}" == "basic" ]]; then
            composer update --prefer-dist --no-interaction
          fi;

          composer dump-autoload -o

      - name: Run tests
        run: |
          mkdir -p build/logs
          phpunit_version="$(php vendor/bin/phpunit --version | awk 'NR == 1 { print $2 }')"
          phpunit_major="${phpunit_version%%.*}"
          phpunit_config="phpunit.xml"

          if [[ ! "$phpunit_major" =~ ^[0-9]+$ ]]; then
            echo "Unable to detect PHPUnit major version from: $phpunit_version" >&2
            exit 1
          fi

          if [[ "$phpunit_major" -lt 10 ]]; then
            phpunit_config="phpunit-legacy.xml"
          fi

          php vendor/bin/phpunit -c "$phpunit_config" --coverage-clover=build/logs/clover.xml

      - name: Upload coverage results to Coveralls
        continue-on-error: true
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer global require php-coveralls/php-coveralls
          php-coveralls --coverage_clover=build/logs/clover.xml -v

      - name: Upload coverage results to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: build/logs/clover.xml

      - name: Archive logs artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: logs_composer-${{ matrix.composer }}_php-${{ matrix.php }}
          path: |
            build/logs

  phpstan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - phpstan-config: phpstan.neon
            label: "8.x"
            php: 8.4
          - phpstan-config: phpstan-php7.neon
            label: "7.x"
            php: 7.4
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: zip
          tools: composer

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "directory=$(composer config cache-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: phpstan-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: phpstan-composer-

      - name: Install runtime dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-dev
          composer dump-autoload -o

      - name: Install PHPStan
        run: |
          composer require --dev --no-interaction phpstan/phpstan:^2.1 phpstan/phpstan-strict-rules:^2.0

      - name: Run PHPStan (PHP ${{ matrix.label }})
        run: |
          php vendor/bin/phpstan analyse -c ${{ matrix.phpstan-config }}

  infection:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: 8.3
          coverage: xdebug
          extensions: zip
          tools: composer

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "directory=$(composer config cache-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: infection-composer-${{ hashFiles('composer.json', '.github/workflows/ci.yml') }}
          restore-keys: infection-composer-

      - name: Install runtime dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-dev
          composer dump-autoload -o

      - name: Install Infection and PHPStan
        run: |
          composer config --no-plugins allow-plugins.infection/extension-installer true
          composer require --dev --no-interaction infection/infection:^0.32.7 phpstan/phpstan:^2.1 phpstan/phpstan-strict-rules:^2.0

      - name: Run Infection with PHPStan integration
        run: |
          php vendor/bin/infection --configuration=infection.json5 --logger-github
